# This workflow can be triggered manually; it also runs every Monday at 11:45 UTC.
# This workflow grabs globbed notebooks from the RAIL repository, runs them, and
# renders the notebooks with outputs into .rst files for easy integration into
# ReadTheDocs.
        
name: Render notebooks

on:
  workflow_dispatch:
  schedule:
    - cron: 45 11 * * 1

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy: 
      matrix:
        super-group: ['interactive','pipeline']
        notebook-dir: ['core','creation','estimation','evaluation','goldenspike']
    steps:
    
    # Set up and installation
    - uses: actions/checkout@v6
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: System deps (MPI + build)
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
        build-essential libbz2-dev \
        openmpi-bin libopenmpi-dev
    - name: Install dependencies
      run: |
        cd ..
        git clone https://github.com/LSSTDESC/rail.git
        cd rail

        # The following was copied from rail's CI (from main repo) on Jan 20, 2026:
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install "numpy<2" cython
        python -m pip install --upgrade --no-binary=mpi4py mpi4py
        python -m pip install --no-build-isolation somoclu
        python -m pip install --upgrade pip
        pip install wheel numpy
        pip install .[dev]
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

        # Extras, for notebooks:
        pip install jupyter nbconvert # For notebooks
        sudo apt-get install pandoc
        
        
    # Render notebooks
    - name: Render notebooks
      run: |
        mkdir -p logs/${{ matrix.super-group }}_examples
        python src/rail_notebooks/render_notebooks.py ${{ matrix.notebook-dir }} ${{ matrix.super-group }} -v > logs/${{ matrix.super-group }}_examples/${{ matrix.notebook-dir }}_logs.out 2>&1  | tee logs/${{ matrix.super-group }}_examples/${{ matrix.notebook-dir }}_logs.out
      if: always()

    - name: Upload rendered artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rendered-${{ matrix.super-group }}-${{ matrix.notebook-dir }}
        path: docs/${{ matrix.super-group }}_examples/rendered/${{ matrix.notebook-dir }}_examples/

    - name: Upload logs artifacts
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ matrix.super-group }}-${{ matrix.notebook-dir }}
        path: logs/${{ matrix.super-group }}_examples/${{ matrix.notebook-dir }}_logs.out

  
  commit-changes:
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
    - uses: actions/checkout@v6
    - name: Download rendered artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: rendered-*
        merge-multiple: true

    - name: Display structure of downloaded files
      run: ls -R ./
    
